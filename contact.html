<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact - BWM Machinery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/master.min.css">
<link rel="stylesheet" href="css/contact.min.css">
<link rel="stylesheet" href="css/normalize.css">
<link rel="stylesheet" href="css/animate.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
<div class="site">
	<header>
		<a href="index.html"><img src="assets/img/pics/logo_png.png" class="logo"></a>

		<nav>
				<div id="home"><a href="index.html" class="link"><p>HOME</p></a></div>
				<div id="forsale"><a href="forsale.html" class="link"><p>FOR SALE</p></a></div>
				<div id="catalog"><a href="catalog.html" class="link"><p>CATALOG</p></a></div>
				<div id="contact" class="active_page"><a href="contact.html" class="link"><p>CONTACT</p></a></div>
				<div id="about"><a href="about.html" class="link"><p>ABOUT</p></a></div>
		</nav>
	</header>

	<div class="content">
		<div class="contact-box animated fadeIn">
			<div class="contact-info">
				<h2>Get In <span>Touch</span></h2>
				<div class="info-row">
					<i class="fa fa-map-marker"></i>
					<span>B.W.Mack (Machinery) Ltd<br>Downham Market<br>Norfolk</span>
				</div>
				<div class="info-row">
					<i class="fa fa-phone"></i>
					<span>Call us for sales &amp; parts enquiries</span>
				</div>
				<div class="info-row">
					<i class="fa fa-envelope"></i>
					<span>Contact us for all your machinery needs — new, used, and service</span>
				</div>
				<div class="info-row">
					<i class="fa fa-clock-o"></i>
					<span>Monday &ndash; Friday<br>8:00am &ndash; 5:30pm</span>
				</div>
			</div>
			<div class="contact-photo">
				<img src="assets/img/pics/office.jpg" alt="BWM Machinery Office">
				<a href="https://www.google.com/maps/search/Downham+Market+Norfolk" class="directions-link" target="_blank" rel="noopener">
					<i class="fa fa-map-marker"></i> Get Directions
				</a>
			</div>
		</div>
	</div>

	<footer>
		<img class="sponsor" src="assets/img/pics/sponsors/updated_sponsors/claas.png" alt="Claas">
		<img class="sponsor" src="assets/img/pics/sponsors/updated_sponsors/lely.png" alt="Lely">
		<img class="sponsor" src="assets/img/pics/sponsors/updated_sponsors/hardi.png" alt="Hardi">
		<img class="sponsor" src="assets/img/pics/sponsors/updated_sponsors/merlo.png" alt="Merlo">
		<img class="sponsor" src="assets/img/pics/sponsors/updated_sponsors/renault.png" alt="Renault">
	</footer>
</div>
</body>
</html>
